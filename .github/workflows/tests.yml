name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: ""
          ALLOW_EXTERNAL_CONTENT_TO_LLM: "false"
          ALLOW_HASH_EMBEDDING_FALLBACK: "true"
          ENABLE_CROSS_ENCODER_RERANKER: "false"
        run: python -m pytest -q --cov=src --cov-report=term --cov-fail-under=75

      - name: Build Gradio app
        env:
          OPENAI_API_KEY: ""
          ALLOW_EXTERNAL_CONTENT_TO_LLM: "false"
          ALLOW_HASH_EMBEDDING_FALLBACK: "true"
          ENABLE_CROSS_ENCODER_RERANKER: "false"
        run: python -c "import app; demo = app.build_app(); print(type(demo).__name__)"
